<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoAlerta | Novo Reporte</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#eef2f7,#dbeafe);
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#0f172a;
color:#fff;
padding:30px 20px;
position:fixed;
height:100%;
}

.logo{
font-size:30px;
font-weight:800;
color:#22c55e;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:14px;
margin-bottom:12px;
text-decoration:none;
color:#cbd5e1;
border-radius:12px;
transition:.3s;
}

.sidebar a:hover,
.active{
background:#1e293b;
color:#fff;
}

/* MAIN */
.main{
margin-left:250px;
width:100%;
padding:35px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topo h1{
font-size:34px;
font-weight:800;
color:#0f172a;
}

.user{
background:#fff;
padding:12px 18px;
border-radius:14px;
font-weight:bold;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

/* CARD */
.box{
background:#fff;
padding:35px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
max-width:1000px;
margin:auto;
}

.section{
margin-bottom:28px;
}

.section h2{
font-size:22px;
margin-bottom:15px;
color:#0f172a;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select,textarea{
width:100%;
padding:15px;
border:1px solid #dbe2ea;
border-radius:14px;
margin-bottom:15px;
outline:none;
font-size:15px;
transition:.2s;
}

input:focus,
select:focus,
textarea:focus{
border-color:#22c55e;
box-shadow:0 0 0 4px rgba(34,197,94,.12);
}

button{
padding:15px;
border:none;
border-radius:14px;
background:#16a34a;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#15803d;
transform:translateY(-2px);
}

.full{
width:100%;
}

.preview{
margin-top:10px;
max-width:220px;
border-radius:15px;
display:none;
}

.msg{
margin-top:15px;
font-weight:bold;
color:#16a34a;
line-height:1.6;
}

/* RESPONSIVO */
@media(max-width:900px){

.sidebar{
width:100%;
height:auto;
position:relative;
}

.main{
margin-left:0;
}

body{
flex-direction:column;
}

.grid2{
grid-template-columns:1fr;
}

.topo{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

#toast{
position:fixed;
top:25px;
right:25px;
background:#22c55e;
color:#fff;
padding:14px 18px;
border-radius:12px;
font-weight:bold;
display:none;
z-index:999;
box-shadow:0 10px 20px rgba(0,0,0,.12);
}

}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">EcoAlerta</div>

<a href="dashboard.html">📊 Dashboard</a>
<a href="#" class="active">➕ Novo Reporte</a>
<a href="meus-registros.html">📄 Meus Registros</a>
<a href="conta.html">👤 Minha Conta</a>
<a href="index.html" onclick="logout()">🚪 Sair</a>

</div>

<div id="toast">✅ Operação realizada com sucesso!</div>

<!-- MAIN -->
<div class="main">

<div class="topo">
<h1>Novo Reporte</h1>
<div class="user" id="nomeUser"></div>
</div>

<div class="box">

<form id="formReporte">

<!-- SOBRE -->
<div class="section">
<h2>📌 Sobre a Ocorrência</h2>

<input type="text" id="titulo" placeholder="Título da ocorrência" required>

<select id="categoria" required>
<option value="">Selecione a categoria</option>
<option>Vazamento de Água</option>
<option>Falta de Água</option>
<option>Desperdício de Energia</option>
<option>Poste apagado</option>
<option>Fio caído</option>
<option>Lixo irregular</option>
<option>Outro</option>
</select>

<select id="gravidade">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
<option>Urgente</option>
</select>

<textarea id="descricao" rows="5" placeholder="Descreva detalhadamente..." required></textarea>
</div>

<!-- LOCALIZAÇÃO -->
<div class="section">
<h2>📍 Localização</h2>

<div class="grid2">
<input type="text" id="cidade" placeholder="Cidade">
<input type="text" id="bairro" placeholder="Bairro">
</div>

<div class="grid2">
<input type="text" id="rua" placeholder="Rua / Referência">
<input type="text" id="cep" placeholder="CEP">
</div>

<input type="text" id="coords" placeholder="Localização GPS" readonly>

<button type="button" onclick="pegarLocalizacao()">Usar minha localização atual</button>
</div>

<!-- IMAGEM -->
<div class="section">
<h2>📸 Evidência</h2>

<input type="file" id="foto" accept="image/*">

<img id="preview" class="preview">
</div>

<!-- EXTRA -->
<div class="section">
<h2>📅 Informações Extras</h2>

<div class="grid2">
<input type="date" id="dataOcorrencia">
<input type="time" id="horaOcorrencia">
</div>
</div>

<button class="full" type="submit">Enviar Reporte</button>

<div class="msg" id="msg"></div>

</form>

</div>

</div>

<script>

/* LOGIN */
if(localStorage.getItem("logado") !== "true"){
window.location.href = "login.html";
}

const usuario =
JSON.parse(localStorage.getItem("usuario"));

document.getElementById("nomeUser").innerText =
`Olá, ${usuario.nome} 👋`;

/* SAIR */
function sair(){
localStorage.removeItem("logado");
window.location.href = "login.html";
}

/* LOCALIZAÇÃO */
function pegarLocalizacao(){

navigator.geolocation.getCurrentPosition((pos)=>{

const lat = pos.coords.latitude.toFixed(5);
const lon = pos.coords.longitude.toFixed(5);

document.getElementById("coords").value =
`Lat: ${lat} | Lon: ${lon}`;

},()=>{
alert("Não foi possível obter localização.");
});

}

/* FOTO PREVIEW */
document.getElementById("foto")
.addEventListener("change",(e)=>{

const file = e.target.files[0];
const preview =
document.getElementById("preview");

if(file){
preview.src =
URL.createObjectURL(file);

preview.style.display = "block";
}

});

/* ENVIAR */
document.getElementById("formReporte")
.addEventListener("submit",(e)=>{

e.preventDefault();

let reportes =
JSON.parse(localStorage.getItem("reportes")) || [];

/* protocolo */
const numero = reportes.length + 1;

const protocolo =
"EA-" + numero.toString().padStart(4,"0");

/* novo reporte */
const novo = {

protocolo: protocolo,
usuario: usuario.nome,
titulo: document.getElementById("titulo").value,
categoria: document.getElementById("categoria").value,
gravidade: document.getElementById("gravidade").value,
descricao: document.getElementById("descricao").value,
cidade: document.getElementById("cidade").value,
bairro: document.getElementById("bairro").value,
rua: document.getElementById("rua").value,
cep: document.getElementById("cep").value,
gps: document.getElementById("coords").value,
dataOcorrencia:
document.getElementById("dataOcorrencia").value,
horaOcorrencia:
document.getElementById("horaOcorrencia").value,
status:"Em análise",
dataEnvio:
new Date().toLocaleDateString("pt-BR")

};

reportes.push(novo);

localStorage.setItem(
"reportes",
JSON.stringify(reportes)
);

document.getElementById("msg").innerHTML =
`Reporte enviado com sucesso!<br>
Protocolo: <b>${protocolo}</b><br>
Status: Em análise`;

document.getElementById("formReporte").reset();

document.getElementById("preview").style.display =
"none";

setTimeout(()=>{
window.location.href="dashboard.html";
},1200);

});

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},2500);
}

</script>

</body>
</html>
