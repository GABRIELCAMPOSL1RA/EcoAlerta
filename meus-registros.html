<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoAlerta | Meus Registros</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#eef2f7,#dbeafe);
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#0f172a;
color:#fff;
padding:30px 20px;
position:fixed;
height:100%;
}

.logo{
font-size:30px;
font-weight:800;
color:#22c55e;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:14px;
margin-bottom:12px;
text-decoration:none;
color:#cbd5e1;
border-radius:12px;
transition:.3s;
}

.sidebar a:hover,
.active{
background:#1e293b;
color:#fff;
}

/* MAIN */
.main{
margin-left:250px;
width:100%;
padding:35px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topo h1{
font-size:34px;
font-weight:800;
color:#0f172a;
}

.user{
background:#fff;
padding:12px 18px;
border-radius:14px;
font-weight:bold;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

/* FILTROS */
.filtros{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:15px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:14px;
border:1px solid #dbe2ea;
border-radius:14px;
font-size:15px;
outline:none;
background:#fff;
}

/* BOX */
.box{
background:#fff;
padding:28px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
}

/* TABELA */
.tableWrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th{
padding:15px;
text-align:left;
background:#f8fafc;
font-size:14px;
}

td{
padding:15px;
border-bottom:1px solid #eef2f7;
font-size:14px;
}

.badge{
padding:7px 10px;
border-radius:30px;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.pendente{background:#fef3c7;color:#92400e;}
.resolvido{background:#dcfce7;color:#166534;}
.urgente{background:#fee2e2;color:#991b1b;}

.btn{
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:13px;
font-weight:bold;
margin-right:6px;
}

.edit{
background:#dbeafe;
color:#1d4ed8;
}

.delete{
background:#fee2e2;
color:#991b1b;
}

.save{
background:#22c55e;
color:#fff;
}

.cancel{
background:#e5e7eb;
color:#111827;
}

.empty{
text-align:center;
padding:35px;
font-weight:bold;
color:#64748b;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-box{
background:#fff;
width:100%;
max-width:520px;
border-radius:24px;
padding:28px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
animation:show .2s ease;
}

@keyframes show{
from{transform:translateY(20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.modal-box h2{
font-size:26px;
margin-bottom:18px;
color:#0f172a;
}

.modal-box textarea{
height:130px;
resize:none;
margin-top:12px;
}

.modal-actions{
display:flex;
gap:12px;
margin-top:18px;
justify-content:flex-end;
}

@media(max-width:1000px){

.sidebar{
width:100%;
position:relative;
height:auto;
}

body{
flex-direction:column;
}

.main{
margin-left:0;
}

.filtros{
grid-template-columns:1fr;
}

}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">EcoAlerta</div>

<a href="dashboard.html">📊 Dashboard</a>
<a href="novo-report.html">➕ Novo Reporte</a>
<a href="#" class="active">📄 Meus Registros</a>
<a href="conta.html">👤 Minha Conta</a>
<a href="index.html" onclick="logout()">🚪 Sair</a>
</div>

<div class="main">

<div class="topo">
<h1>Meus Registros</h1>
<div class="user" id="nomeUser"></div>
</div>

<div class="filtros">
<input type="text" id="busca" placeholder="Pesquisar protocolo ou título">
<select id="filtroStatus">
<option value="">Todos Status</option>
<option>Em análise</option>
<option>Resolvido</option>
</select>

<select id="filtroCategoria">
<option value="">Todas Categorias</option>
<option>Vazamento de Água</option>
<option>Falta de Água</option>
<option>Desperdício de Energia</option>
<option>Poste apagado</option>
<option>Fio caído</option>
<option>Lixo irregular</option>
<option>Outro</option>
</select>
</div>

<div class="box">
<div class="tableWrap">
<table>
<thead>
<tr>
<th>Protocolo</th>
<th>Título</th>
<th>Categoria</th>
<th>Status</th>
<th>Gravidade</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<!-- MODAL EDITAR -->
<div class="modal" id="modalEditar">
<div class="modal-box">

<h2>Editar Registro</h2>

<input type="text" id="editTitulo" placeholder="Título">

<textarea id="editDescricao"
placeholder="Descrição"></textarea>

<div class="modal-actions">
<button class="btn cancel"
onclick="fecharModal()">Cancelar</button>

<button class="btn save"
onclick="salvarEdicao()">Salvar</button>
</div>

</div>
</div>

<script>

if(localStorage.getItem("logado") !== "true"){
window.location.href="login.html";
}

const usuario =
JSON.parse(localStorage.getItem("usuario"));

document.getElementById("nomeUser").innerText =
`Olá, ${usuario.nome} 👋`;

function sair(){
localStorage.removeItem("logado");
window.location.href="login.html";
}

let reportes =
JSON.parse(localStorage.getItem("reportes")) || [];

let idEditando = null;

/* RENDER */
function render(){

let dados = reportes;

let busca =
document.getElementById("busca").value.toLowerCase();

let status =
document.getElementById("filtroStatus").value;

let categoria =
document.getElementById("filtroCategoria").value;

dados = dados.filter(r=>{

let protocolo =
String(r.protocolo || "").toLowerCase();

let titulo =
String(r.titulo || "").toLowerCase();

return (
(protocolo.includes(busca) ||
titulo.includes(busca))
&&
(status=="" || r.status==status)
&&
(categoria=="" || r.categoria==categoria)
);

});

const tbody =
document.getElementById("tbody");

tbody.innerHTML = "";

if(dados.length==0){

tbody.innerHTML = `
<tr>
<td colspan="7" class="empty">
Nenhum registro encontrado.
</td>
</tr>`;
return;
}

dados.reverse().forEach(r=>{

let classe="pendente";

if(r.status=="Resolvido")
classe="resolvido";

if(r.gravidade=="Urgente")
classe="urgente";

tbody.innerHTML += `

<tr>
<td><b>${r.protocolo}</b></td>
<td>${r.titulo}</td>
<td>${r.categoria}</td>

<td>
<span class="badge ${classe}">
${r.status}
</span>
</td>

<td>${r.gravidade}</td>
<td>${r.dataEnvio || "-"}</td>

<td>

<button class="btn edit"
onclick="abrirEditar('${r.protocolo}')">
Editar
</button>

<button class="btn delete"
onclick="excluir('${r.protocolo}')">
Excluir
</button>

</td>
</tr>

`;

});

}

/* MODAL */
function abrirEditar(id){

let item =
reportes.find(r =>
String(r.protocolo) === String(id)
);

if(!item) return;

idEditando = id;

document.getElementById("editTitulo").value =
item.titulo || "";

document.getElementById("editDescricao").value =
item.descricao || "";

document.getElementById("modalEditar").style.display =
"flex";

}

function fecharModal(){

document.getElementById("modalEditar").style.display =
"none";

}

/* SALVAR */
function salvarEdicao(){

let item =
reportes.find(r =>
String(r.protocolo) === String(idEditando)
);

if(!item) return;

item.titulo =
document.getElementById("editTitulo").value.trim();

item.descricao =
document.getElementById("editDescricao").value.trim();

localStorage.setItem(
"reportes",
JSON.stringify(reportes)
);

fecharModal();
render();

}

/* EXCLUIR */
function excluir(id){

if(!confirm("Deseja excluir?"))
return;

reportes =
reportes.filter(r =>
String(r.protocolo) !== String(id)
);

localStorage.setItem(
"reportes",
JSON.stringify(reportes)
);

render();

}

/* EVENTOS */
document.getElementById("busca")
.addEventListener("input",render);

document.getElementById("filtroStatus")
.addEventListener("change",render);

document.getElementById("filtroCategoria")
.addEventListener("change",render);

render();

</script>

</body>
</html>
